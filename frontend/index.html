<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoJá - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Nosso CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <h1>Moto<span>Já</span></h1>
                <p>Mototáxi rápido em Valença - BA</p>
            </div>

            <!-- Alerta de erro (escondido por padrão) -->
            <div id="alerta-erro" class="alert alert-danger d-none" role="alert"></div>

            <!-- Alerta de sucesso -->
            <div id="alerta-sucesso" class="alert alert-success d-none" role="alert"></div>

            <!-- Formulário de Login -->
            <form id="form-login">
                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="mb-3">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="senha" placeholder="Sua senha" required>
                </div>

                <button type="submit" class="btn btn-motoja w-100 mb-3">Entrar</button>

                <div class="text-center">
                    <span class="text-muted">Não tem conta?</span>
                    <a href="cadastro.html" class="text-decoration-none" style="color: #FFC107; font-weight: 600;"> Cadastre-se</a>
                </div>
            </form>

            <!-- Acesso rápido pra testes -->
            <hr>
            <p class="text-muted text-center" style="font-size: 0.8rem;">Acesso rápido (teste):</p>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary btn-sm flex-fill" onclick="loginRapido('joao@email.com')">
                    Passageiro
                </button>
                <button class="btn btn-outline-secondary btn-sm flex-fill" onclick="loginRapido('carlos@email.com')">
                    Mototaxista
                </button>
            </div>
        </div>

        <div class="footer-motoja">
            MotoJa &copy; 2025 - Valenca, Bahia
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        var API = '/api';

        // Verificar se já está logado
        window.addEventListener('load', () => {
            const usuario = JSON.parse(localStorage.getItem('motoja_usuario'));
            if (usuario) {
                redirecionarPainel(usuario.tipo);
            }
        });

        // Login
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            esconderAlertas();

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            try {
                const resp = await fetch(`${API}/usuarios/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const data = await resp.json();

                if (!resp.ok) {
                    mostrarErro(data.erro);
                    return;
                }

                // Salvar usuário no localStorage
                localStorage.setItem('motoja_usuario', JSON.stringify(data.usuario));
                redirecionarPainel(data.usuario.tipo);

            } catch (err) {
                mostrarErro('Não foi possível conectar ao servidor. Verifique se o backend está rodando.');
            }
        });

        // Login rápido pra testes
        async function loginRapido(email) {
            document.getElementById('email').value = email;
            document.getElementById('senha').value = '123456';
            document.getElementById('form-login').dispatchEvent(new Event('submit'));
        }

        // Redirecionar pro painel correto
        function redirecionarPainel(tipo) {
            if (tipo === 'passageiro') {
                window.location.href = 'painel-passageiro.html';
            } else {
                window.location.href = 'painel-mototaxista.html';
            }
        }

        // Funções de alerta
        function mostrarErro(msg) {
            const el = document.getElementById('alerta-erro');
            el.textContent = msg;
            el.classList.remove('d-none');
        }

        function mostrarSucesso(msg) {
            const el = document.getElementById('alerta-sucesso');
            el.textContent = msg;
            el.classList.remove('d-none');
        }

        function esconderAlertas() {
            document.getElementById('alerta-erro').classList.add('d-none');
            document.getElementById('alerta-sucesso').classList.add('d-none');
        }
    </script>

</body>
</html>
