<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoJa - Mototaxista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-motoja">
        <div class="container-fluid">
            <span class="navbar-brand">Moto<span style="color:#FFC107">Ja</span></span>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white" id="nome-usuario" style="font-size:0.9rem;"></span>
                <button class="btn btn-sm btn-sair btn-outline-warning" onclick="sair()">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container mt-3 mb-5">
        <div id="alerta" class="alert d-none" role="alert"></div>

        <div class="toggle-status mb-3">
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="toggle-online" checked style="width:3em;height:1.5em;">
                <label class="form-check-label fw-bold" for="toggle-online" id="label-status">Online - recebendo corridas</label>
            </div>
        </div>

        <div id="secao-corrida-aceita" class="d-none">
            <div class="card-corrida" style="border-left-color:#28a745;">
                <h5>Corrida atual</h5>
                <div class="status-timeline" id="timeline-moto">
                    <div class="status-step" id="mstep-aceita"><div class="step-line"></div><div class="step-dot">1</div><div class="step-label">Aceita</div></div>
                    <div class="status-step" id="mstep-andamento"><div class="step-line"></div><div class="step-dot">2</div><div class="step-label">Em andamento</div></div>
                    <div class="status-step" id="mstep-finalizada"><div class="step-dot">3</div><div class="step-label">Finalizada</div></div>
                </div>
                <div id="mapa-corrida" style="height:220px; border-radius:8px; margin-bottom:15px;"></div>
                <p class="endereco mb-1" id="aceita-origem"></p>
                <p class="endereco mb-2" id="aceita-destino"></p>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div><strong>Passageiro:</strong> <span id="aceita-passageiro"></span><br><strong>Tel:</strong> <span id="aceita-telefone"></span></div>
                    <span class="preco" id="aceita-preco"></span>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-motoja flex-fill" id="btn-iniciar" onclick="iniciarCorrida()">Iniciar corrida</button>
                    <button class="btn btn-aceitar flex-fill" id="btn-finalizar" onclick="abrirFinalizacao()" style="display:none;">Finalizar</button>
                    <button class="btn btn-recusar" onclick="cancelarCorrida()">X</button>
                </div>
            </div>
        </div>

        <div id="secao-disponiveis" class="painel-info mb-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Corridas disponiveis</h5>
                <button class="btn btn-sm btn-outline-secondary" onclick="carregarDisponiveis()">Atualizar</button>
            </div>
            <div id="lista-disponiveis"><div class="sem-corridas"><p>Nenhuma corrida disponivel no momento.</p></div></div>
        </div>

        <div class="painel-info">
            <h5>Minhas corridas</h5>
            <div id="historico-lista"><p class="text-muted text-center">Carregando...</p></div>
        </div>
    </div>

    <div id="modal-finalizar" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h5 class="text-center mb-3">Finalizar corrida</h5>
            <p class="text-center text-muted">Como o passageiro vai pagar?</p>
            <div class="pagamento-opcoes">
                <div class="pagamento-opcao" onclick="selFinPag('dinheiro', this)"><span class="icone-pag">R$</span><span class="texto-pag">Dinheiro</span></div>
                <div class="pagamento-opcao" onclick="selFinPag('pix', this)"><span class="icone-pag">PIX</span><span class="texto-pag">Pix</span></div>
                <div class="pagamento-opcao" onclick="selFinPag('cartao', this)"><span class="icone-pag">CARD</span><span class="texto-pag">Cartao</span></div>
            </div>
            <button class="btn btn-aceitar w-100 mt-3" id="btn-confirmar-fin" onclick="finalizarCorrida()" disabled>Confirmar e finalizar</button>
            <button class="btn btn-link text-muted w-100" onclick="document.getElementById('modal-finalizar').style.display='none'">Voltar</button>
        </div>
    </div>

    <div id="modal-avaliacao" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="avaliacao-container">
                <h5>Avalie o passageiro</h5>
                <p class="text-muted" id="aval-nome-moto"></p>
                <div class="estrelas" id="estrelas-moto">
                    <span class="estrela" data-nota="1" onclick="clicarEstrelaMoto(1)">&#9733;</span>
                    <span class="estrela" data-nota="2" onclick="clicarEstrelaMoto(2)">&#9733;</span>
                    <span class="estrela" data-nota="3" onclick="clicarEstrelaMoto(3)">&#9733;</span>
                    <span class="estrela" data-nota="4" onclick="clicarEstrelaMoto(4)">&#9733;</span>
                    <span class="estrela" data-nota="5" onclick="clicarEstrelaMoto(5)">&#9733;</span>
                </div>
                <button class="btn btn-motoja w-100" id="btn-avaliar-moto" onclick="enviarAvaliacaoMoto()" disabled>Enviar</button>
                <button class="btn btn-link text-muted mt-2" onclick="fecharAvaliacaoMoto()">Pular</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var API = '/api';
        var usuario = null;
        var corridaAceita = null;
        var mapaCorrente = null;
        var notaMoto = 0;
        var finPag = null;

        window.addEventListener('load', function() {
            usuario = JSON.parse(localStorage.getItem('motoja_usuario'));
            if (!usuario || usuario.tipo !== 'mototaxista') { window.location.href = 'index.html'; return; }
            document.getElementById('nome-usuario').textContent = usuario.nome;
            carregarDisponiveis();
            carregarHistorico();
            setInterval(function() { if (!corridaAceita) carregarDisponiveis(); }, 5000);
        });

        document.getElementById('toggle-online').addEventListener('change', function(e) {
            var on = e.target.checked;
            document.getElementById('label-status').textContent = on ? 'Online - recebendo corridas' : 'Offline - sem receber corridas';
            document.getElementById('secao-disponiveis').classList.toggle('d-none', !on);
            fetch(API + '/usuarios/' + usuario.id + '/disponibilidade', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ disponivel: on })
            });
        });

        function criarIconeMoto(cor) {
            return L.divIcon({
                html: '<div style="width:16px;height:16px;background:' + cor + ';border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.4);"></div>',
                iconSize: [16, 16], iconAnchor: [8, 8], className: ''
            });
        }

        function carregarDisponiveis() {
            if (!document.getElementById('toggle-online').checked || corridaAceita) return;
            fetch(API + '/corridas/disponiveis')
            .then(function(r) { return r.json(); })
            .then(function(corridas) {
                var lista = document.getElementById('lista-disponiveis');
                if (corridas.length === 0) {
                    lista.innerHTML = '<div class="sem-corridas"><p>Nenhuma corrida disponivel no momento.</p></div>';
                    return;
                }
                var html = '';
                for (var i = 0; i < corridas.length; i++) {
                    var c = corridas[i];
                    var distText = c.distancia_km ? '<small class="text-muted">~' + parseFloat(c.distancia_km).toFixed(1) + ' km</small>' : '';
                    html += '<div class="card-corrida">' +
                        '<div class="d-flex justify-content-between align-items-start mb-2">' +
                        '<div><p class="endereco mb-0">' + c.origem_endereco + '</p><p class="endereco mb-0">' + c.destino_endereco + '</p></div>' +
                        '<span class="preco">R$ ' + parseFloat(c.preco).toFixed(2) + '</span></div>' +
                        '<div class="d-flex justify-content-between align-items-center">' +
                        '<small class="text-muted">' + c.nome_passageiro + ' - ' + c.telefone_passageiro + '</small>' +
                        '<button class="btn btn-aceitar btn-sm" onclick="aceitarCorrida(' + c.id + ')">Aceitar</button></div>' +
                        distText + '</div>';
                }
                lista.innerHTML = html;
            })
            .catch(function() {});
        }

        function aceitarCorrida(id) {
            fetch(API + '/corridas/' + id + '/aceitar', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mototaxista_id: usuario.id })
            })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.erro) { mostrarAlerta(d.erro, 'danger'); carregarDisponiveis(); return; }
                mostrarAlerta('Corrida aceita!', 'success');
                fetch(API + '/corridas/minhas/' + usuario.id)
                .then(function(r) { return r.json(); })
                .then(function(minhas) {
                    for (var i = 0; i < minhas.length; i++) {
                        if (minhas[i].id === id) { corridaAceita = minhas[i]; mostrarCorridaAceita(minhas[i]); break; }
                    }
                });
            })
            .catch(function() { mostrarAlerta('Erro.', 'danger'); });
        }

        function mostrarCorridaAceita(c) {
            document.getElementById('secao-disponiveis').classList.add('d-none');
            document.getElementById('secao-corrida-aceita').classList.remove('d-none');
            document.getElementById('aceita-origem').textContent = c.origem_endereco;
            document.getElementById('aceita-destino').textContent = c.destino_endereco;
            document.getElementById('aceita-preco').textContent = 'R$ ' + parseFloat(c.preco).toFixed(2);
            document.getElementById('aceita-passageiro').textContent = c.nome_passageiro || '-';
            document.getElementById('aceita-telefone').textContent = c.telefone_passageiro || '-';

            var isAndamento = c.status === 'em_andamento';
            document.getElementById('mstep-aceita').className = 'status-step' + (isAndamento ? ' done' : ' active');
            document.getElementById('mstep-andamento').className = 'status-step' + (isAndamento ? ' active' : '');
            document.getElementById('mstep-finalizada').className = 'status-step';
            document.getElementById('btn-iniciar').style.display = isAndamento ? 'none' : 'block';
            document.getElementById('btn-finalizar').style.display = isAndamento ? 'block' : 'none';

            setTimeout(function() {
                if (mapaCorrente) mapaCorrente.remove();
                var lat = c.origem_lat || -13.3697;
                var lng = c.origem_lng || -39.0731;
                mapaCorrente = L.map('mapa-corrida').setView([lat, lng], 14);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(mapaCorrente);
                if (c.origem_lat) L.marker([c.origem_lat, c.origem_lng], { icon: criarIconeMoto('#28a745') }).addTo(mapaCorrente);
                if (c.destino_lat) {
                    L.marker([c.destino_lat, c.destino_lng], { icon: criarIconeMoto('#dc3545') }).addTo(mapaCorrente);
                    L.polyline([[c.origem_lat, c.origem_lng], [c.destino_lat, c.destino_lng]], { color: '#FFC107', weight: 4, dashArray: '10,10' }).addTo(mapaCorrente);
                    mapaCorrente.fitBounds([[c.origem_lat, c.origem_lng], [c.destino_lat, c.destino_lng]], { padding: [30, 30] });
                }
            }, 200);
        }

        function iniciarCorrida() {
            if (!corridaAceita) return;
            fetch(API + '/corridas/' + corridaAceita.id + '/iniciar', { method: 'PUT' })
            .then(function() {
                mostrarAlerta('Corrida iniciada!', 'success');
                corridaAceita.status = 'em_andamento';
                mostrarCorridaAceita(corridaAceita);
            });
        }

        function abrirFinalizacao() {
            finPag = null;
            var opcoes = document.querySelectorAll('#modal-finalizar .pagamento-opcao');
            for (var i = 0; i < opcoes.length; i++) opcoes[i].classList.remove('selecionado');
            document.getElementById('btn-confirmar-fin').disabled = true;
            document.getElementById('modal-finalizar').style.display = 'flex';
        }

        function selFinPag(tipo, el) {
            finPag = tipo;
            var opcoes = document.querySelectorAll('#modal-finalizar .pagamento-opcao');
            for (var i = 0; i < opcoes.length; i++) opcoes[i].classList.remove('selecionado');
            el.classList.add('selecionado');
            document.getElementById('btn-confirmar-fin').disabled = false;
        }

        function finalizarCorrida() {
            if (!corridaAceita || !finPag) return;
            fetch(API + '/corridas/' + corridaAceita.id + '/finalizar', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ forma_pagamento: finPag })
            })
            .then(function() {
                document.getElementById('modal-finalizar').style.display = 'none';
                mostrarAlerta('Corrida finalizada!', 'success');
                abrirAvaliacaoMoto();
            });
        }

        function cancelarCorrida() {
            if (!corridaAceita || !confirm('Cancelar corrida?')) return;
            fetch(API + '/corridas/' + corridaAceita.id + '/cancelar', { method: 'PUT' })
            .then(function() { resetarTelaMoto(); mostrarAlerta('Cancelada.', 'warning'); });
        }

        function resetarTelaMoto() {
            corridaAceita = null;
            if (mapaCorrente) { mapaCorrente.remove(); mapaCorrente = null; }
            document.getElementById('secao-corrida-aceita').classList.add('d-none');
            document.getElementById('secao-disponiveis').classList.remove('d-none');
            document.getElementById('btn-iniciar').style.display = 'block';
            document.getElementById('btn-finalizar').style.display = 'none';
            carregarDisponiveis();
            carregarHistorico();
        }

        function abrirAvaliacaoMoto() {
            document.getElementById('aval-nome-moto').textContent = corridaAceita && corridaAceita.nome_passageiro ? 'Passageiro: ' + corridaAceita.nome_passageiro : '';
            notaMoto = 0;
            var estrelas = document.querySelectorAll('#estrelas-moto .estrela');
            for (var i = 0; i < estrelas.length; i++) estrelas[i].classList.remove('ativa');
            document.getElementById('btn-avaliar-moto').disabled = true;
            document.getElementById('modal-avaliacao').style.display = 'flex';
        }

        function clicarEstrelaMoto(nota) {
            notaMoto = nota;
            var estrelas = document.querySelectorAll('#estrelas-moto .estrela');
            for (var i = 0; i < estrelas.length; i++) {
                if (parseInt(estrelas[i].getAttribute('data-nota')) <= nota) estrelas[i].classList.add('ativa');
                else estrelas[i].classList.remove('ativa');
            }
            document.getElementById('btn-avaliar-moto').disabled = false;
        }

        function enviarAvaliacaoMoto() {
            fetch(API + '/corridas/' + corridaAceita.id + '/avaliar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario_id: usuario.id, tipo_avaliador: 'mototaxista', nota: notaMoto })
            })
            .then(function() { mostrarAlerta('Avaliacao enviada! ' + notaMoto + ' estrela(s)', 'success'); })
            .catch(function() {})
            .finally(function() { fecharAvaliacaoMoto(); });
        }

        function fecharAvaliacaoMoto() {
            document.getElementById('modal-avaliacao').style.display = 'none';
            resetarTelaMoto();
        }

        function carregarHistorico() {
            fetch(API + '/corridas/minhas/' + usuario.id)
            .then(function(r) { return r.json(); })
            .then(function(corridas) {
                var lista = document.getElementById('historico-lista');
                var fin = corridas.filter(function(c) { return c.status === 'finalizada' || c.status === 'cancelada'; });
                if (fin.length === 0) { lista.innerHTML = '<p class="text-muted text-center">Nenhuma corrida.</p>'; return; }
                var pagLabels = { dinheiro: '[R$]', pix: '[PIX]', cartao: '[CARD]' };
                var html = '';
                for (var i = 0; i < Math.min(fin.length, 10); i++) {
                    var c = fin[i];
                    var stars = '';
                    if (c.avaliacao_mototaxista) { for (var s = 0; s < c.avaliacao_mototaxista; s++) stars += '* '; }
                    var pagText = c.forma_pagamento ? (pagLabels[c.forma_pagamento] || '') : '';
                    html += '<div class="card-corrida" style="border-left-color:' + (c.status === 'finalizada' ? '#28a745' : '#dc3545') + '; padding:15px;">' +
                        '<div class="d-flex justify-content-between"><small class="text-muted">' + formatarData(c.criado_em) + '</small>' +
                        '<span class="status-badge status-' + c.status + '">' + (c.status === 'finalizada' ? 'Finalizada' : 'Cancelada') + '</span></div>' +
                        '<p class="endereco mb-0 mt-1">' + c.origem_endereco + '</p><p class="endereco mb-1">' + c.destino_endereco + '</p>' +
                        '<div class="d-flex justify-content-between">' +
                        '<span class="text-muted">' + (c.nome_passageiro || '-') + ' ' + pagText + '</span>' +
                        '<span class="fw-bold text-success">R$ ' + parseFloat(c.preco).toFixed(2) + ' ' + stars + '</span></div></div>';
                }
                lista.innerHTML = html;
            })
            .catch(function() {});
        }

        function formatarData(d) {
            var dt = new Date(d);
            return dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        function mostrarAlerta(msg, tipo) {
            var el = document.getElementById('alerta');
            el.textContent = msg;
            el.className = 'alert alert-' + tipo;
            el.classList.remove('d-none');
            setTimeout(function() { el.classList.add('d-none'); }, 4000);
        }

        function sair() {
            localStorage.removeItem('motoja_usuario');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
